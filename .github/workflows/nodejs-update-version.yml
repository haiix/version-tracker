name: Update Node.js Versions

on:
  schedule:
    - cron: '18 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Fetch Node.js Versions
        run: |
          # 公式JSONを一度取得
          curl -s https://nodejs.org/dist/index.json > node_data.json

          # LTSとCurrentを抽出
          LATEST_LTS=$(cat node_data.json | jq -r '[.[] | select(.lts != false)][0].version')
          LATEST_CURRENT=$(cat node_data.json | jq -r '.[0].version')

          # フォルダを作成して保存
          mkdir -p nodejs
          echo "$LATEST_LTS" > nodejs/lts.txt
          echo "$LATEST_CURRENT" > nodejs/current.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update Node.js versions: $(cat nodejs/lts.txt) / $(cat nodejs/current.txt)"
          committer: GitHub Action <action@github.com>
          author: GitHub Action <action@github.com>
          branch: update-nodejs-versions  # PR用の作業ブランチ名
          title: "chore: update Node.js version data"
          body: "Node.jsの公式サイトから最新のLTSとCurrentのバージョンを取得しました。"
          delete-branch: true             # マージ後にブランチを削除
