name: Update Git Versions

on:
  schedule:
    - cron: '37 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Fetch Git Versions
        run: |
          curl -s https://api.github.com/repos/git/git/tags > tags.json

          # 最新のRC版（例: v2.54.0-rc2）
          LATEST_RC=$(jq -r '[.[] 
            | select(.name | test("-rc[0-9]+$"))
          ][0].name' tags.json)

          # 最新の安定版（例: v2.53.0）
          LATEST_STABLE=$(jq -r '[.[] 
            | select(.name | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))
          ][0].name' tags.json)

          mkdir -p git
          echo "$LATEST_RC" > git/rc.txt
          echo "$LATEST_STABLE" > git/stable.txt

      - name: Commit and Push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add git/*.txt

          if ! git diff --cached --quiet; then
            git commit -m "Update Git versions: $(cat git/stable.txt) / $(cat git/rc.txt)"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
